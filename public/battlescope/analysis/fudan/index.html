<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>复旦 · 赛局总览</title><style>
:root{color-scheme:dark;font-family:"Arial Narrow","Microsoft YaHei UI",system-ui,sans-serif;--bg:#090c12;--panel:#121722;--border:#293244;--text:#f2f5fa;--muted:#94a0b5;--gold:#f7c95c;--damage:#ff6878;--cyan:#52d3df;--purple:#a987ff}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 35% -10%,#202b43 0,var(--bg) 42%);color:var(--text)}main{width:min(1360px,calc(100% - 28px));margin:auto;padding:28px 0 60px}a{color:#b9a7ff;text-decoration:none}h1{font-size:clamp(25px,4vw,40px);font-weight:550;margin:7px 0}.sub,.method{color:var(--muted);font-size:13px}.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:end;margin:18px 0}.controls label{display:grid;gap:6px;color:var(--muted);font-size:12px}select{min-width:310px;background:#111722;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px}.cards{display:grid;grid-template-columns:repeat(5,minmax(130px,1fr));gap:10px;margin:14px 0}.card,.chart-card{background:rgba(18,23,34,.94);border:1px solid var(--border);border-radius:11px}.card{padding:13px}.card span{display:block;color:var(--muted);font-size:11px}.card strong{display:block;font-size:23px;margin-top:5px}.charts{display:grid;grid-template-columns:1fr 1fr;gap:12px}.chart-card{padding:14px;min-width:0}.chart-card.wide{grid-column:1/-1}.chart-head{display:flex;justify-content:space-between;gap:15px;align-items:baseline;margin-bottom:8px}.chart-head h2{font-size:15px;margin:0;font-weight:550}.legend{color:var(--muted);font-size:11px}.chart{width:100%;height:280px;display:block}.grid{stroke:#222b3b;stroke-width:1}.tick{fill:#8591a6;font-size:10px}.line{fill:none;stroke-width:2;stroke-linejoin:round;stroke-linecap:round}.tip{position:fixed;display:none;pointer-events:none;background:#090c12ef;border:1px solid #3a465c;border-radius:7px;padding:7px 9px;font-size:12px;z-index:3}.method{margin-top:12px;line-height:1.7}@media(max-width:850px){.charts{grid-template-columns:1fr}.chart-card.wide{grid-column:auto}.cards{grid-template-columns:repeat(2,1fr)}.chart{height:240px}}
.module-tabs{display:flex;gap:8px;margin:18px 0}.module-tab{border:1px solid var(--border);border-radius:999px;padding:9px 16px;background:#111722;color:var(--muted);cursor:pointer}.module-tab[aria-selected="true"]{color:var(--text);border-color:#8e79ea;background:#211c38}.comparison-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.comparison-side{min-width:0}.comparison-head{border-left:3px solid var(--cyan);padding:3px 0 3px 11px;margin:4px 0 12px}.comparison-side.fudan .comparison-head{border-color:var(--damage)}.comparison-head h2{margin:0 0 4px;font-size:20px}.comparison-side .cards{grid-template-columns:repeat(3,1fr)}.comparison-side .charts{grid-template-columns:1fr}.comparison-side .chart-card.wide{grid-column:auto}.comparison-side .chart{height:220px}.strong-state{padding:38px 14px;text-align:center;border:1px dashed var(--border);border-radius:11px;color:var(--muted)}[hidden]{display:none!important}@media(max-width:1050px){.comparison-grid{grid-template-columns:1fr}}@media(max-width:600px){.comparison-side .cards{grid-template-columns:repeat(2,1fr)}select{min-width:260px}}
</style><link rel="stylesheet" href="/battlescope/assets/battle-theme.css"></head><body><main>
<nav class="analysis-switcher" aria-label="分析页面快捷切换"><a class="switcher-home" href="/battlescope/">首页</a><a href="/battlescope/analysis/fudan/" aria-current="page">赛局总览</a><a href="/battlescope/analysis/tactical/">交战态势</a><a href="/battlescope/analysis/strong/">强队对标</a><a href="/battlescope/analysis/operators/">操作表现</a><a href="/battlescope/analysis/opponents/">对手分析</a></nav><h1>赛局总览</h1>
<div class="module-tabs" role="tablist" aria-label="赛局总览选项"><button id="fudanTab" class="module-tab" type="button" role="tab" aria-selected="true" aria-controls="fudanModule">复旦赛局</button><button id="strongTab" class="module-tab" type="button" role="tab" aria-selected="false" aria-controls="strongModule">强队对比</button></div>
<section id="fudanModule" role="tabpanel"><div id="subtitle" class="sub">正在读取数据…</div>
<div class="controls"><label>选择对局<select id="game"></select></label><span id="result" class="sub"></span></div>
<section class="cards"><div class="card"><span>最终累计经济</span><strong id="economyTotal">-</strong></div><div class="card"><span>造成伤害</span><strong id="damageTotal">-</strong></div><div class="card"><span>每 100 金币伤害</span><strong id="efficiencyTotal">-</strong></div><div class="card"><span>哨兵发弹</span><strong id="sentinelTotal">-</strong></div><div class="card"><span>步兵发弹</span><strong id="infantryTotal">-</strong></div></section>
<section class="charts"><article class="chart-card wide"><div class="chart-head"><h2>整场经济趋势 · 伤害趋势 · 转化率</h2><span class="legend">独立刻度 · 经济 <b style="color:var(--gold)">●</b>　伤害 <b style="color:var(--damage)">●</b>　每100金币伤害 <b style="color:var(--purple)">●</b></span></div><svg id="economyChart" class="chart"></svg></article><article class="chart-card"><div class="chart-head"><h2>哨兵火力覆盖</h2><span class="legend">最近 10 秒发弹量</span></div><svg id="sentinelChart" class="chart"></svg></article><article class="chart-card"><div class="chart-head"><h2>步兵火力覆盖</h2><span class="legend">合计 <b style="color:var(--cyan)">●</b>　步兵3 <b style="color:var(--gold)">●</b>　步兵4 <b style="color:var(--purple)">●</b></span></div><svg id="infantryChart" class="chart"></svg></article></section>
<p id="method" class="method"></p></section>
<section id="strongModule" role="tabpanel" hidden><div id="strongSubtitle" class="sub">选择学校和对局后，再加载该局分析数据与复旦左右对比。</div><div class="controls"><label>强队学校<select id="strongSchool"><option value="">请选择学校</option></select></label><label>强队对局<select id="strongGame" disabled><option value="">请先选择学校</option></select></label><label>复旦对局<select id="fudanGame" disabled><option value="">正在读取复旦对局…</option></select></label></div><div id="strongState" class="strong-state">尚未选择强队对局，不会提前加载单局分析数据。</div><div id="strongComparison" class="comparison-grid" hidden></div><p id="strongMethod" class="method"></p></section><div id="tip" class="tip"></div>
</main><script>
const NS='http://www.w3.org/2000/svg',colors={gold:'#f7c95c',damage:'#ff6878',cyan:'#52d3df',purple:'#a987ff'},select=document.getElementById('game'),tip=document.getElementById('tip');let payload;
const node=(name,attrs={})=>{const n=document.createElementNS(NS,name);Object.entries(attrs).forEach(([k,v])=>n.setAttribute(k,v));return n},format=(v,d=0)=>v==null?'-':Number(v).toLocaleString('zh-CN',{maximumFractionDigits:d});
function chart(svg,times,series){svg.innerHTML='';const w=svg.clientWidth||600,h=svg.clientHeight||280,p={l:44,r:18,t:12,b:27},iw=w-p.l-p.r,ih=h-p.t-p.b,maxima=series.map(s=>Math.max(1,...s.values.filter(v=>v!=null))),x=t=>p.l+t/(times.at(-1)||1)*iw;for(let i=0;i<=4;i++){let y=p.t+ih*i/4;svg.append(node('line',{x1:p.l,y1:y,x2:w-p.r,y2:y,class:'grid'}));if(series.length===1){let tx=node('text',{x:p.l-7,y:y+3,'text-anchor':'end',class:'tick'});tx.textContent=format(maxima[0]*(1-i/4));svg.append(tx)}}for(let i=0;i<=6;i++){let t=Math.round(times.at(-1)*i/6),tx=node('text',{x:x(t),y:h-7,'text-anchor':'middle',class:'tick'});tx.textContent=t+'s';svg.append(tx)}series.forEach((s,j)=>{let points=[];s.values.forEach((v,i)=>{if(v!=null)points.push(`${x(times[i]).toFixed(1)},${(p.t+ih-v/maxima[j]*ih).toFixed(1)}`)});svg.append(node('polyline',{points:points.join(' '),class:'line',stroke:s.color}))});const hit=node('rect',{x:p.l,y:p.t,width:iw,height:ih,fill:'transparent'});hit.onmousemove=e=>{const r=svg.getBoundingClientRect(),second=Math.max(0,Math.min(times.at(-1),Math.round((e.clientX-r.left-p.l)/iw*times.at(-1))));tip.innerHTML=`<b>${second}s</b><br>`+series.map(s=>`${s.name}：${format(s.values[second],1)}`).join('<br>');tip.style.cssText=`display:block;left:${e.clientX+12}px;top:${e.clientY+12}px`};hit.onmouseleave=()=>tip.style.display='none';svg.append(hit)}
function render(){const g=payload.games[+select.value],t=g.totals;result.textContent=`${g.won?'胜':'负'} · ${g.camp}方 · game_id ${g.game_id}`;economyTotal.textContent=format(t.economy);damageTotal.textContent=format(t.damage);efficiencyTotal.textContent=format(t.efficiency,1);sentinelTotal.textContent=format(t.sentinel_shots);infantryTotal.textContent=format(t.infantry_shots);chart(economyChart,g.times,[{name:'累计经济',values:g.economy,color:colors.gold},{name:'累计伤害',values:g.damage,color:colors.damage},{name:'每100金币伤害',values:g.efficiency,color:colors.purple}]);chart(sentinelChart,g.times,[{name:'哨兵10秒发弹',values:g.sentinel_fire_10s,color:colors.damage}]);chart(infantryChart,g.times,[{name:'步兵合计',values:g.infantry_fire_10s,color:colors.cyan},{name:'步兵3',values:g.infantry3_fire_10s,color:colors.gold},{name:'步兵4',values:g.infantry4_fire_10s,color:colors.purple}])}
const fudanTab=document.getElementById('fudanTab'),strongTab=document.getElementById('strongTab'),fudanModule=document.getElementById('fudanModule'),strongModule=document.getElementById('strongModule'),strongSchool=document.getElementById('strongSchool'),strongGame=document.getElementById('strongGame'),fudanGame=document.getElementById('fudanGame'),strongState=document.getElementById('strongState'),strongComparison=document.getElementById('strongComparison'),strongSubtitle=document.getElementById('strongSubtitle'),strongMethod=document.getElementById('strongMethod');let strongCatalog=null,strongPayload=null,strongController=null;const strongCache=new Map();
const escapeHtml=value=>String(value??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const fudanLabel=g=>`第${g.场次号}场第${g.局号}局 · vs ${g.opponent} · ${g.won?'胜':'负'}`;
const strongLabel=g=>`${g.赛区} · 第${g.场次号}场第${g.局号}局 · vs ${g.opponent} · ${g.won?'胜':'负'}`;
function switchModule(showStrong){fudanTab.setAttribute('aria-selected',String(!showStrong));strongTab.setAttribute('aria-selected',String(showStrong));fudanModule.hidden=showStrong;strongModule.hidden=!showStrong;if(showStrong){if(!strongCatalog)loadStrongCatalog();if(payload){fudanGame.value=select.value;if(strongPayload)renderStrong()}}else if(payload)render()}
async function loadStrongCatalog(){strongSubtitle.textContent='正在读取强队对局目录…';try{const response=await fetch('/battlescope/api/strong-compare/catalog.json');if(!response.ok)throw Error('强队对局目录读取失败');strongCatalog=await response.json();strongSchool.innerHTML='<option value="">请选择学校</option>'+strongCatalog.teams.map((team,index)=>`<option value="${index}">${escapeHtml(team.school)}（${team.game_count}局）</option>`).join('');strongSubtitle.textContent=`覆盖 ${strongCatalog.team_count} 所学校、${strongCatalog.game_count} 个学校对局样本；选择具体对局后才加载单局分析。`}catch(error){strongSubtitle.textContent=error.message}}
function selectStrongSchool(){if(strongController)strongController.abort();strongPayload=null;strongComparison.hidden=true;strongMethod.textContent='';const team=strongSchool.value===''?null:strongCatalog?.teams[Number(strongSchool.value)];if(!team){strongGame.disabled=true;strongGame.innerHTML='<option value="">请先选择学校</option>';strongState.hidden=false;strongState.textContent='尚未选择强队对局，不会提前加载单局分析数据。';return}strongGame.disabled=!team.games.length;strongGame.innerHTML='<option value="">请选择对局（选择后加载）</option>'+team.games.map((game,index)=>`<option value="${index}">${escapeHtml(strongLabel(game))}</option>`).join('');strongState.hidden=false;strongState.textContent=team.games.length?`已列出 ${team.school} 的全部 ${team.game_count} 局；尚未加载任何单局分析。`:'数据集中没有该校对局。'}
function sideMarkup(game,kind){const totals=game.totals,isFudan=kind==='fudan';return `<article class="comparison-side ${isFudan?'fudan':'strong'}" data-side="${kind}"><header class="comparison-head"><h2>${escapeHtml(game.school)}</h2><div class="sub">${game.camp}方 · ${game.won?'胜':'负'} · 对手 ${escapeHtml(game.opponent)} · game_id ${game.game_id}</div></header><section class="cards"><div class="card"><span>最终累计经济</span><strong>${format(totals.economy)}</strong></div><div class="card"><span>造成伤害</span><strong>${format(totals.damage)}</strong></div><div class="card"><span>每 100 金币伤害</span><strong>${format(totals.efficiency,1)}</strong></div><div class="card"><span>哨兵发弹</span><strong>${format(totals.sentinel_shots)}</strong></div><div class="card"><span>步兵发弹</span><strong>${format(totals.infantry_shots)}</strong></div></section><section class="charts"><article class="chart-card"><div class="chart-head"><h2>经济 · 伤害 · 转化率</h2><span class="legend">独立刻度</span></div><svg data-chart="economy" class="chart"></svg></article><article class="chart-card"><div class="chart-head"><h2>哨兵火力覆盖</h2><span class="legend">最近 10 秒发弹量</span></div><svg data-chart="sentinel" class="chart"></svg></article><article class="chart-card"><div class="chart-head"><h2>步兵火力覆盖</h2><span class="legend">合计 / 步兵3 / 步兵4</span></div><svg data-chart="infantry" class="chart"></svg></article></section></article>`}
function drawSide(kind,game){const root=strongComparison.querySelector(`[data-side="${kind}"]`);chart(root.querySelector('[data-chart="economy"]'),game.times,[{name:'累计经济',values:game.economy,color:colors.gold},{name:'累计伤害',values:game.damage,color:colors.damage},{name:'每100金币伤害',values:game.efficiency,color:colors.purple}]);chart(root.querySelector('[data-chart="sentinel"]'),game.times,[{name:'哨兵10秒发弹',values:game.sentinel_fire_10s,color:colors.damage}]);chart(root.querySelector('[data-chart="infantry"]'),game.times,[{name:'步兵合计',values:game.infantry_fire_10s,color:colors.cyan},{name:'步兵3',values:game.infantry3_fire_10s,color:colors.gold},{name:'步兵4',values:game.infantry4_fire_10s,color:colors.purple}])}
function renderStrong(){if(!strongPayload||!payload)return;const fudan=payload.games[Number(fudanGame.value)||0],strong=strongPayload.game;strongComparison.innerHTML=sideMarkup(strong,'strong')+sideMarkup(fudan,'fudan');strongComparison.hidden=false;strongState.hidden=true;drawSide('strong',strong);drawSide('fudan',fudan);strongMethod.textContent=`统一统计口径：${strongPayload.methodology.damage}；${strongPayload.methodology.economy}；转化率 = ${strongPayload.methodology.efficiency}；曲线 = ${strongPayload.methodology.fire}。`}
async function selectStrongGame(){if(strongController)strongController.abort();strongPayload=null;strongComparison.hidden=true;strongMethod.textContent='';const team=strongSchool.value===''?null:strongCatalog?.teams[Number(strongSchool.value)],match=team&&strongGame.value!==''?team.games[Number(strongGame.value)]:null;if(!match){strongState.hidden=false;strongState.textContent='尚未选择强队对局，不会提前加载单局分析数据。';return}strongState.hidden=false;strongState.textContent='正在加载并解析所选强队对局…';try{if(strongCache.has(match.data_url))strongPayload=strongCache.get(match.data_url);else{strongController=new AbortController();const response=await fetch(match.data_url,{signal:strongController.signal});if(!response.ok)throw Error('所选强队对局读取失败');strongPayload=await response.json();strongCache.set(match.data_url,strongPayload)}renderStrong()}catch(error){if(error.name!=='AbortError')strongState.textContent=error.message}}
fetch('/battlescope/api/fudan.json').then(r=>{if(!r.ok)throw Error('分析数据读取失败');return r.json()}).then(data=>{payload=data;subtitle.textContent=`覆盖 ${data.game_count} 局比赛，按对局查看经济伤害转化与火力时段`;const options=data.games.map((g,i)=>`<option value="${i}">${escapeHtml(fudanLabel(g))}</option>`).join('');select.innerHTML=options;fudanGame.innerHTML=options;fudanGame.disabled=false;method.textContent=`统计口径：${data.methodology.damage}；${data.methodology.economy}；转化率 = ${data.methodology.efficiency}；曲线 = ${data.methodology.fire}。`;render()}).catch(e=>{subtitle.textContent=e.message;fudanGame.innerHTML='<option>复旦对局读取失败</option>'});
select.onchange=()=>{render();fudanGame.value=select.value;if(strongPayload&&!strongModule.hidden)renderStrong()};fudanGame.onchange=()=>{select.value=fudanGame.value;if(strongPayload)renderStrong()};fudanTab.onclick=()=>switchModule(false);strongTab.onclick=()=>switchModule(true);strongSchool.onchange=selectStrongSchool;strongGame.onchange=selectStrongGame;window.onresize=()=>{if(!strongModule.hidden&&strongPayload)renderStrong();else if(payload)render()};
</script></body></html>
