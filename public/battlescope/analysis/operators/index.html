<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>复旦 · 操作表现</title><style>
:root{color-scheme:dark;font-family:"Arial Narrow","Microsoft YaHei UI",system-ui,sans-serif;--bg:#090d14;--panel:#131a26;--border:#2d384b;--text:#f4f7fb;--muted:#97a4b8;--accent:#52d7b0;--warn:#f6c963}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 40% -20%,#27344c 0,var(--bg) 43%);color:var(--text)}main{width:min(1300px,calc(100% - 28px));margin:auto;padding:28px 0 60px}a{color:#9fcaff;text-decoration:none}h1{font-size:clamp(26px,4vw,40px);margin:8px 0}p{color:var(--muted)}select{font:inherit;min-width:240px;padding:10px;background:#101722;border:1px solid var(--border);border-radius:8px;color:var(--text)}.notice{border:1px solid #5e5434;background:#211d12;border-radius:9px;padding:11px 13px;color:#e9d99f;font-size:12px;line-height:1.6;margin:15px 0}.cards{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;margin:15px 0}.card,.panel{background:rgba(19,26,38,.95);border:1px solid var(--border);border-radius:10px}.card{padding:12px}.card span{display:block;color:var(--muted);font-size:10px}.card b{display:block;font-size:21px;margin-top:5px}.panel{padding:14px;overflow:auto}table{width:100%;border-collapse:collapse;font-size:11px;white-space:nowrap}th,td{text-align:right;padding:8px;border-bottom:1px solid #293346}th:first-child,td:first-child{text-align:left}tr:hover{background:#182130}.win{color:var(--accent)}.loss{color:#ff7182}.method{font-size:11px;line-height:1.7;margin-top:13px}@media(max-width:850px){.cards{grid-template-columns:repeat(2,1fr)}}
</style><link rel="stylesheet" href="/battlescope/assets/battle-theme.css"></head><body><main>
<nav class="analysis-switcher" aria-label="分析页面快捷切换"><a class="switcher-home" href="/battlescope/">首页</a><a href="/battlescope/analysis/fudan/">赛局总览</a><a href="/battlescope/analysis/tactical/">交战态势</a><a href="/battlescope/analysis/strong/">强队对标</a><a href="/battlescope/analysis/operators/" aria-current="page">操作表现</a></nav>
<h1>操作表现</h1><p>全部指标来自复旦 17 局遥测与事件，按机器人操作位汇总。</p>
<label>选择操作位　<select id="role"></select></label>
<section id="cards" class="cards"></section>
<section class="panel"><table><thead><tr><th>对局</th><th>结果</th><th>存活秒</th><th>阵亡</th><th>发弹</th><th>每存活分钟发弹</th><th>承伤</th><th>路程/m</th><th>高热量秒</th><th>支援距离/m</th><th>孤立秒</th><th>最长火力空窗</th></tr></thead><tbody id="rows"></tbody></table></section>
<p id="method" class="method"></p>
</main><script>
const role=document.getElementById('role'),cards=document.getElementById('cards'),rows=document.getElementById('rows'),method=document.getElementById('method');let data;
const fmt=(v,d=0)=>v==null?'-':Number(v).toLocaleString('zh-CN',{maximumFractionDigits:d});
function render(){const report=data.reports[+role.value],s=report.summary;cards.innerHTML=[['比赛',s.game_count],['胜局',s.wins],['阵亡',s.deaths],['发弹',s.shots],['每存活分钟发弹',fmt(s.shots_per_alive_minute,1)],['累计承伤',fmt(s.damage_taken)],['累计路程',fmt(s.path_m,1)+'m'],['高热量',s.high_heat_seconds+'s'],['孤立时间',s.isolated_seconds+'s'],['平均支援距离',fmt(s.mean_support_distance,1)+'m']].map(v=>`<div class="card"><span>${v[0]}</span><b>${v[1]}</b></div>`).join('');rows.innerHTML=report.matches.map(v=>`<tr><td>第${v.场次号}场第${v.局号}局 · ${v.opponent}</td><td class="${v.won?'win':'loss'}">${v.won?'胜':'负'}</td><td>${v.alive_seconds}</td><td>${v.deaths}</td><td>${v.shots}</td><td>${fmt(v.shots_per_alive_minute,1)}</td><td>${fmt(v.damage_taken)}</td><td>${fmt(v.path_m,1)}</td><td>${v.high_heat_seconds}</td><td>${fmt(v.mean_support_distance,1)}</td><td>${v.isolated_seconds}</td><td>${v.longest_fire_gap==null?'不适用':v.longest_fire_gap+'s'}</td></tr>`).join('')}
fetch('/battlescope/api/operators.json').then(r=>{if(!r.ok)throw Error('报告读取失败');return r.json()}).then(p=>{data=p;role.innerHTML=p.reports.map((v,i)=>`<option value="${i}">${v.identity}</option>`).join('');method.textContent='统计口径：'+Object.values(p.methodology).join('；')+'。';render()}).catch(e=>method.textContent=e.message);role.onchange=render;
</script></body></html>
