<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>对手分析 · RM BattleScope</title><style>
:root{color-scheme:dark;font-family:"Microsoft YaHei UI",system-ui,sans-serif;--bg:#071018;--panel:#111d29;--border:#2a3b4d;--text:#eef5fb;--muted:#91a2b5;--opponent:#ff7182;--fudan:#f6c963}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% -20%,#23374b,var(--bg) 45%);color:var(--text)}main{width:min(1220px,calc(100% - 28px));margin:auto;padding:28px 0 56px}h1{margin:18px 0 5px}.muted,.status,.method{color:var(--muted)}.controls{display:flex;flex-wrap:wrap;gap:12px;margin:20px 0}.controls label{display:grid;gap:5px;color:var(--muted);font-size:11px}select{min-width:250px;padding:10px;border-radius:8px;border:1px solid var(--border);background:#0d1721;color:var(--text);font:inherit}.panel{background:rgba(17,29,41,.96);border:1px solid var(--border);border-radius:11px;padding:15px;margin:13px 0}.panel-head{display:flex;justify-content:space-between;gap:12px;align-items:baseline}.panel-head h2{font-size:16px;margin:0}.radar-layout{display:grid;grid-template-columns:minmax(380px,1.2fr) minmax(260px,.8fr);align-items:center;gap:15px}svg{width:100%;height:380px}.grid{fill:none;stroke:#304254}.axis{stroke:#40566b}.label{fill:var(--text);font-size:12px}.value{fill:var(--muted);font-size:10px}.shape-opponent{fill:#ff718228;stroke:var(--opponent);stroke-width:2.5}.shape-fudan{fill:#f6c9630d;stroke:var(--fudan);stroke-width:2;stroke-dasharray:7 5}.legend{line-height:2;color:var(--muted)}.legend b{color:var(--text)}table{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap}th,td{text-align:right;padding:9px;border-bottom:1px solid #273848}th:first-child,td:first-child{text-align:left}.table-wrap{overflow:auto}.empty{color:var(--muted)}.method{font-size:11px;line-height:1.7}@media(max-width:780px){.radar-layout{grid-template-columns:1fr}.panel-head{align-items:flex-start;flex-direction:column}select{min-width:0;width:100%}.controls{display:grid}}
</style><link rel="stylesheet" href="/battlescope/assets/battle-theme.css"></head><body><main>
<nav class="analysis-switcher" aria-label="分析页面快捷切换"><a class="switcher-home" href="/battlescope/">首页</a><a href="/battlescope/analysis/fudan/">赛局总览</a><a href="/battlescope/analysis/tactical/">交战态势</a><a href="/battlescope/analysis/strong/">强队对标</a><a href="/battlescope/analysis/operators/">操作表现</a><a href="/battlescope/analysis/opponents/" aria-current="page">对手分析</a></nav>
<h1>对手分析</h1><p class="muted">按对手学校全部比赛汇总各机器人操作位，并与复旦同兵种历史平均对比。</p>
<section class="controls"><label>对手学校<select id="school"><option>正在读取…</option></select></label><label>机器人类型<select id="role"></select></label></section>
<section class="panel"><div class="panel-head"><h2 id="title">平均六维表现</h2><span id="status" class="status"></span></div><div class="radar-layout"><svg id="radar" viewBox="0 0 520 380" role="img" aria-label="对手与复旦平均六维表现雷达图"></svg><div id="legend" class="legend"></div></div></section>
<section class="panel"><div class="panel-head"><h2>全部机器人类型汇总</h2><span class="status">工程使用装配与经济，其他机器人使用发弹与增益</span></div><div class="table-wrap"><table><thead><tr><th>机器人</th><th>学校</th><th>样本</th><th>阵亡</th><th>承伤</th><th>支援距离/m</th><th>孤立/s</th><th>专项指标一</th><th>专项指标二</th></tr></thead><tbody id="rows"></tbody></table></div></section><p id="method" class="method"></p>
</main><script>
const NS='http://www.w3.org/2000/svg',school=document.getElementById('school'),role=document.getElementById('role'),radar=document.getElementById('radar'),rows=document.getElementById('rows'),status=document.getElementById('status'),title=document.getElementById('title'),legend=document.getElementById('legend'),method=document.getElementById('method');let data=null,payload=null;const fmt=(v,d=1)=>v==null?'暂无数据':Number(v).toLocaleString('zh-CN',{maximumFractionDigits:d}),esc=v=>String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));function node(n,a={}){const e=document.createElementNS(NS,n);Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));return e}function point(i,r){const a=-Math.PI/2+i*Math.PI/3;return[260+Math.cos(a)*r,184+Math.sin(a)*r]}function shape(report,side,cls){if(!side.sample_count)return;const pts=report.radar_metrics.map((m,i)=>point(i,120*Number(side.scores[m.key]??50)/100));radar.append(node('polygon',{points:pts.map(p=>p.join(',')).join(' '),class:cls}))}
function unit(k){return k==='isolated_seconds'?'s':k==='mean_support_distance'?'m':k==='assembly_max_level'?'级':k==='economy_gain_7m'?'金币':k==='shots'?'发':k==='buff_count'?'次':k==='deaths'?'次':''}function shown(k,v){return v==null?'暂无数据':fmt(v,k==='economy_gain_7m'?0:1)+unit(k)}function draw(){const report=payload.reports.find(v=>v.robot_type===role.value)||payload.reports[0],metrics=report.radar_metrics;radar.innerHTML='';for(let r=1;r<=4;r++)radar.append(node('polygon',{points:metrics.map((_,i)=>point(i,30*r).join(',')).join(' '),class:'grid'}));metrics.forEach((m,i)=>{const end=point(i,120),lp=point(i,151),anchor=i===0||i===3?'middle':i<3?'start':'end';radar.append(node('line',{x1:260,y1:184,x2:end[0],y2:end[1],class:'axis'}));const l=node('text',{x:lp[0],y:lp[1]-3,'text-anchor':anchor,class:'label'});l.textContent=m.label;radar.append(l);const v=node('text',{x:lp[0],y:lp[1]+12,'text-anchor':anchor,class:'value'});v.textContent=`${shown(m.key,report.opponent.averages[m.key])} / ${shown(m.key,report.fudan.averages[m.key])}`;radar.append(v)});shape(report,report.fudan,'shape-fudan');shape(report,report.opponent,'shape-opponent');title.textContent=`${payload.school} · ${report.robot_type}平均六维表现`;status.textContent=`对手 ${report.opponent.sample_count} 局 / 复旦 ${report.fudan.sample_count} 局`;legend.innerHTML=`<b style="color:var(--opponent)">━━ ${esc(payload.school)}</b><br><b style="color:var(--fudan)">┅┅ 复旦大学</b><br>轴标签数值顺序：对手 / 复旦${report.opponent.sample_count?'':'<br><span class="empty">该校暂无此兵种数据</span>'}`}
function cells(r,s,n){const a=s.averages,e=r.robot_type==='工程',one=e?shown('assembly_max_level',a.assembly_max_level):shown('shots',a.shots),two=e?shown('economy_gain_7m',a.economy_gain_7m):shown('buff_count',a.buff_count);return `<tr><td>${esc(r.robot_type)}</td><td>${esc(n)}</td><td>${s.sample_count}</td><td>${shown('deaths',a.deaths)}</td><td>${shown('damage_taken',a.damage_taken)}</td><td>${shown('mean_support_distance',a.mean_support_distance)}</td><td>${shown('isolated_seconds',a.isolated_seconds)}</td><td>${one}</td><td>${two}</td></tr>`}function render(){role.innerHTML=payload.reports.map(v=>`<option>${esc(v.robot_type)}</option>`).join('');rows.innerHTML=payload.reports.map(v=>cells(v,v.opponent,payload.school)+cells(v,v.fudan,'复旦大学')).join('');method.textContent='统计口径：'+Object.values(payload.methodology).join('；')+'。';draw()}function load(){payload=data.comparisons.find(v=>v.school===school.value);render()}fetch('/battlescope/api/opponents.json').then(r=>{if(!r.ok)throw Error('对手分析数据读取失败');return r.json()}).then(v=>{data=v;school.innerHTML=v.comparisons.map(x=>`<option>${esc(x.school)}</option>`).join('');if(!v.comparisons.length)throw Error('暂无复旦对手学校');load()}).catch(e=>status.textContent=e.message);school.onchange=load;role.onchange=draw;
</script></body></html>
