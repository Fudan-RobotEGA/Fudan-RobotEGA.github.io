const NS='http://www.w3.org/2000/svg',W=28,H=15,colors={red:'#ff6675',orange:'#f5a05c',blue:'#57baff',cyan:'#55d8d0',gold:'#f5c65c',purple:'#aa8cff'},MOBILE_TYPES=['英雄','工程','步兵3','步兵4','哨兵'],OBJECTIVE_TYPES=['基地','前哨站'],gameSel=document.getElementById('game'),roleSel=document.getElementById('role'),tip=document.getElementById('tip');let payload,current,mapVisible=new Set;

function chart(svg,times,series){svg.innerHTML='';const w=svg.clientWidth||700,h=svg.clientHeight||270,p={l:45,r:16,t:12,b:27},iw=w-p.l-p.r,ih=h-p.t-p.b,all=series.flatMap(s=>s.values.filter(v=>v!=null)),lo=Math.min(0,...all),hi=Math.max(1,...all),x=i=>p.l+i/(Math.max(1,times.length-1))*iw,y=v=>p.t+(hi-v)/(hi-lo)*ih;for(let i=0;i<=4;i++){let yy=p.t+ih*i/4;svg.append(node('line',{x1:p.l,y1:yy,x2:w-p.r,y2:yy,class:'gridline'}));let tx=node('text',{x:p.l-6,y:yy+3,'text-anchor':'end',class:'axis'});tx.textContent=fmt(hi-(hi-lo)*i/4,0);svg.append(tx)}for(let i=0;i<=6;i++){let idx=Math.round((times.length-1)*i/6),tx=node('text',{x:x(idx),y:h-7,'text-anchor':'middle',class:'axis'});tx.textContent=times[idx]+'s';svg.append(tx)}series.forEach(s=>{let chunks=[],part=[];s.values.forEach((v,i)=>{if(v==null){if(part.length)chunks.push(part);part=[]}else part.push(`${x(i).toFixed(1)},${y(v).toFixed(1)}`)});if(part.length)chunks.push(part);chunks.forEach(points=>svg.append(node('polyline',{points:points.join(' '),class:'path',stroke:s.color})))});let hit=node('rect',{x:p.l,y:p.t,width:iw,height:ih,fill:'transparent'});hit.onmousemove=e=>{let r=svg.getBoundingClientRect(),i=Math.max(0,Math.min(times.length-1,Math.round((e.clientX-r.left-p.l)/iw*(times.length-1))));tip.innerHTML=`<b>${times[i]}s</b><br>`+series.map(s=>`${s.name}：${fmt(s.values[i],1)}`).join('<br>');tip.style.cssText=`display:block;left:${e.clientX+12}px;top:${e.clientY+12}px`};hit.onmouseleave=()=>tip.style.display='none';svg.append(hit)}
function markerShape(svg,type,attrs={}){let shape;if(type==='英雄')shape=node('circle',{cx:10,cy:10,r:6});else if(type==='工程')shape=node('rect',{x:4,y:4,width:12,height:12,rx:1});else if(type==='步兵3')shape=node('polygon',{points:'10,2.5 17.5,10 10,17.5 2.5,10'});else if(type==='步兵4')shape=node('polygon',{points:'10,2.5 18,17 2,17'});else if(type==='哨兵')shape=node('polygon',{points:'5,3 15,3 19,10 15,17 5,17 1,10'});else shape=node('circle',{cx:10,cy:10,r:6});Object.entries(attrs).forEach(([k,v])=>shape.setAttribute(k,v));svg.append(shape);return shape}

const sideFor=(g,camp)=>camp===g.camp?'self':'enemy',schoolFor=(g,camp)=>camp===g.camp?g.school:g.opponent,mapKeyFor=(side,type)=>`${side}:${type}`;
function resetMapFilters(){mapVisible=new Set(['self','enemy'].flatMap(side=>MOBILE_TYPES.map(type=>mapKeyFor(side,type))))}
function setMapGroup(side,checked){MOBILE_TYPES.forEach(type=>{let key=mapKeyFor(side,type);checked?mapVisible.add(key):mapVisible.delete(key)});renderMapFilters(current);renderMap(current)}
function renderMapFilters(g){mapFilters.innerHTML='';[['self','我方',g.school,g.camp],['enemy','敌方',g.opponent,g.camp==='红'?'蓝':'红']].forEach(([side,label,school,camp])=>{let group=document.createElement('fieldset');group.className='map-filter-group';let head=document.createElement('div');head.className='map-filter-head';let title=document.createElement('strong');title.textContent=`${label}（${school} · ${camp}方）`;let actions=document.createElement('span');actions.className='map-filter-actions';[['全选',true],['清空',false]].forEach(([text,value])=>{let button=document.createElement('button');button.type='button';button.textContent=text;button.setAttribute('aria-label',`${label}${text}`);button.onclick=()=>setMapGroup(side,value);actions.append(button)});head.append(title,actions);let options=document.createElement('div');options.className='map-filter-options';MOBILE_TYPES.forEach(type=>{let choice=document.createElement('label');choice.className='map-choice';let input=document.createElement('input');input.type='checkbox';input.checked=mapVisible.has(mapKeyFor(side,type));input.dataset.side=side;input.dataset.robotType=type;input.setAttribute('aria-label',`${label}${type}`);input.onchange=()=>{let key=mapKeyFor(side,type);input.checked?mapVisible.add(key):mapVisible.delete(key);renderMap(g)};let sample=markerIcon(type,camp==='红'?colors.red:colors.blue);sample.classList.add('marker-sample');choice.append(input,sample,document.createTextNode(type));options.append(choice)});group.append(head,options);mapFilters.append(group)})}
function renderMapKey(){mapKey.innerHTML='';[['受击：小型半透明',markerIcon('英雄','#c8d2e2')],['死亡：白边及叉号',markerIcon('英雄','#c8d2e2','death')],['红方',markerIcon('英雄',colors.red)],['蓝方',markerIcon('英雄',colors.blue)]].forEach(([label,icon])=>{let item=document.createElement('span');item.className='map-key-item';icon.classList.add('marker-sample');item.append(icon,document.createTextNode(label));mapKey.append(item)});let types=document.createElement('span');types.textContent='形状：○ 英雄　□ 工程　◇ 步兵3　△ 步兵4　⬡ 哨兵';mapKey.append(types)}
function renderMap(g){battleMap.innerHTML='<img class="map-field" src="/battlescope/assets/rmuc_2026_field_top_view.jpeg" alt="">';let shown=0,total=0;[...g.hit_points.map(p=>({...p,kind:'hit',camp:p.victim_camp,type:p.victim_type})),...g.death_points.filter(p=>p.position).map(p=>({...p,kind:'death',type:p.robot_type}))].forEach(p=>{if(OBJECTIVE_TYPES.includes(p.type))return;total++;let side=sideFor(g,p.camp),isMobile=MOBILE_TYPES.includes(p.type);if(isMobile&&!mapVisible.has(mapKeyFor(side,p.type)))return;let d=markerIcon(p.type,p.camp==='红'?colors.red:colors.blue,p.kind),left=Math.max(0,Math.min(100,p.position[0]/W*100)),top=Math.max(0,Math.min(100,(H-p.position[1])/H*100)),eventText=p.kind==='death'?'死亡':`${p.damage} 伤害`;d.classList.add('map-marker',p.kind);d.style.left=left+'%';d.style.top=top+'%';d.setAttribute('role','img');d.setAttribute('aria-label',`${p.time}s ${schoolFor(g,p.camp)} ${side==='self'?'我方':'敌方'} ${p.camp}方 ${p.type||'未知兵种'} ${eventText}`);let title=node('title');title.textContent=`${p.time}s · ${schoolFor(g,p.camp)}（${side==='self'?'我方':'敌方'}，${p.camp}方）· ${p.type||'未知兵种'} · ${eventText}`;d.prepend(title);battleMap.append(d);shown++});mapSummary.textContent=`显示 ${shown}/${total} 个机器人点位`}
function renderMovement(){let m=current.movement_power[roleSel.value];if(!m)return;moveLegend.textContent=`全场 ${fmt(m.total_distance_m,1)}m · 平均 ${fmt(m.mean_power_w,1)}W`;chart(movementChart,current.times,[{name:'累计距离(m)',values:m.distance,color:colors.cyan},{name:'底盘功率(W)',values:m.power,color:colors.gold}])}
function render(){let g=current=payload.games[+gameSel.value],l=g.low_health,d=g.duels;result.textContent=`${g.won?'胜':'负'} · ${g.camp}方 · vs ${g.opponent} · game_id ${g.game_id}`;hits.textContent=fmt(g.hit_points.length);deaths.textContent=fmt(g.death_points.length);escapes.textContent=fmt(l.escaped);finishRate.textContent=l.resolved?pct(l.killed/l.resolved):'-';duels.textContent=fmt(d.eligible_duels);firstRate.textContent=pct(d.school_first_hit_rate);duelWinRate.textContent=pct(d.school_win_rate);firstWinRate.textContent=pct(d.school_first_hit_win_rate);renderMap(g);let o=g.objective_health;chart(objectiveChart,g.times,[{name:'红基地',values:o['红基地']||[],color:colors.red},{name:'红前哨',values:o['红前哨站']||[],color:colors.orange},{name:'蓝基地',values:o['蓝基地']||[],color:colors.blue},{name:'蓝前哨',values:o['蓝前哨站']||[],color:colors.cyan}]);chart(pressureChart,g.times,[{name:'压制差%',values:g.pressure,color:colors.purple},{name:'我方存活',values:g.school_alive,color:colors.gold},{name:'对方存活',values:g.opponent_alive,color:colors.blue}]);roleSel.innerHTML=Object.keys(g.movement_power).map(k=>`<option>${k}</option>`).join('');renderMovement();conversion.innerHTML=g.role_conversion.map(r=>`<tr><td><span class=\"badge\">${r.robot_type}</span></td><td>${fmt(r.inferred_damage)}</td><td>${r.inferred_kills}</td><td>${fmt(r.damage_per_kill,1)}</td><td>${fmt(r.kills_per_1000_damage,2)}</td></tr>`).join('');impact.innerHTML=g.pressure_windows.map(w=>`<tr><td>${w.start}-${w.end}s</td><td>${fmt(w.mean_pressure,1)}</td><td>${fmt(w.next_15s_ground_damage)}</td><td>${fmt(w.next_15s_objective_damage)}</td></tr>`).join('');upgrades.textContent=g.upgrade_events.length?g.upgrade_events.map(e=>`${e.time}s ${e.level}${e.value==null?'':'（值'+e.value+'）'}`).join('　'):'本局无装配成功事件';limits.textContent=Object.values(payload.data_availability).join('；')+'。';method.textContent=`口径：${payload.methodology.pressure}；${payload.methodology.low_health}；${payload.methodology.duel}。攻击匹配：${g.attack_inference_quality.high_confid fetch('/battlescope/api/tactical.json').then(r=>{if(!r.ok)throw Error('战术数据读取失败');return r.json()}).then(data=>{payload=data;subtitle.textContent=`覆盖 ${data.game_count} 局：交火/死亡位置、建筑血量、地面压制、转化效率、移动距离与底盘功率`;gameSel.innerHTML=data.games.map((g,i)=>`<option value=\"${i}\">第${g.场次号}场第${g.局号}局 · vs ${g.opponent} · ${g.won?'胜':'负'}</option>`).join('');resetMapFilters();render();renderMapFilters(current);renderMapKey()}).catch(e=>subtitle.textContent=e.message);gameSel.onchange=()=>{resetMapFilters();render();renderMapFilters(current)};roleSel.onchange=renderMovement;window.onresize=()=>current&&(renderMovement(),renderMap(current));
