<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RM BattleScope | 复旦星云EGA 机甲赛训复盘系统</title>
<style>
:root {
  color-scheme: dark;
  font-family: "Arial Narrow", "Microsoft YaHei UI", system-ui, sans-serif;
  --bg: #0d0f14;
  --panel: #151923;
  --panel-2: #1b202c;
  --border: #30384a;
  --text: #f3f5fa;
  --muted: #9ca7bb;
  --red: #ff4c5d;
  --blue: #3f8cff;
  --accent: #9f7aea;
  --accent-2: #6f55c9;
  --gold: #f4c95d;
  --cyan: #57c9e8;
  --green: #5bd3a9;
}
* { box-sizing: border-box; }
body { margin: 0; min-height: 100vh; background: radial-gradient(circle at 50% -20%, #20283a 0, var(--bg) 42%); color: var(--text); }
button, input, select { font: inherit; }
button { cursor: pointer; }
main { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: 42px 0 72px; }
.hero { display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: end; margin-bottom: 25px; }
.eyebrow { margin-bottom: 8px; color: #c3ccd9; font-size: 11px; letter-spacing: .16em; }
h1 { margin: 0 0 7px; font-size: clamp(30px, 5vw, 48px); font-weight: 530; letter-spacing: -.025em; }
.hero p, .muted { color: var(--muted); }
.hero p { margin: 0; }
.count { white-space: nowrap; color: #c7d0df; border: 1px solid var(--border); border-radius: 999px; padding: 8px 12px; background: rgba(21,25,35,.78); font-size: 12px; }
.module-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 11px; margin-bottom: 34px; }
.module { position: relative; min-height: 142px; padding: 17px; overflow: hidden; border: 1px solid var(--border); border-radius: 12px; background: linear-gradient(145deg, rgba(27,32,44,.96), rgba(17,21,30,.94)); color: var(--text); text-decoration: none; transition: transform .15s, border-color .15s, background .15s; }
.module::before { content: ""; position: absolute; inset: 0 0 auto; height: 3px; background: var(--module-color); }
.module:hover { transform: translateY(-2px); border-color: var(--module-color); background: linear-gradient(145deg, rgba(35,42,58,.98), rgba(18,23,33,.96)); }
.module .index { display: block; color: var(--module-color); font-size: 10px; letter-spacing: .12em; margin-bottom: 18px; }
.module strong { display: block; font-size: 17px; font-weight: 540; margin-bottom: 7px; }
.module small { display: block; color: var(--muted); font-size: 11px; line-height: 1.55; }
.site-return { display: inline-flex; align-items: center; margin-bottom: 22px; color: var(--muted); font-size: 12px; font-weight: 600; text-decoration: none; transition: color .15s, transform .15s; }
.site-return:hover, .site-return:focus-visible { color: var(--text); transform: translateX(-2px); outline: none; }
.section-head { display: flex; justify-content: space-between; gap: 20px; align-items: end; margin-bottom: 13px; }
.section-head h2 { margin: 0 0 4px; font-size: 20px; font-weight: 520; }
.section-head p { margin: 0; color: var(--muted); font-size: 12px; }
.search { position: relative; margin-bottom: 18px; }
.search input { width: 100%; min-height: 50px; padding: 0 16px; border: 1px solid var(--border); border-radius: 10px; background: rgba(21,25,35,.96); color: var(--text); outline: none; }
.search input:focus { border-color: #d8dee8; box-shadow: 0 0 0 3px rgb(216 222 232 / .12); }
.layout { display: grid; grid-template-columns: minmax(0, 1fr) 330px; gap: 18px; align-items: start; }
.matches { display: grid; gap: 9px; }
.match { width: 100%; padding: 13px 15px; border: 1px solid var(--border); border-radius: 9px; background: rgba(21,25,35,.92); color: var(--text); text-align: left; transition: border-color .15s, background .15s, transform .15s; }
.match:hover { border-color: #59647b; background: var(--panel-2); transform: translateY(-1px); }
.match[aria-pressed="true"] { border-color: #d8dee8; background: linear-gradient(90deg, rgb(233 75 95 / .12), rgb(63 143 223 / .12)); box-shadow: inset 3px 0 var(--red), inset -3px 0 var(--blue); }
.match-top, .teams { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
.match-top { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
.teams { font-size: 14px; }
.team { display: inline-flex; gap: 7px; align-items: center; min-width: 0; }
.team span:last-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
.dot.red { background: var(--red); } .dot.blue { background: var(--blue); }
.versus { color: var(--muted); font-size: 11px; }
.empty, .loading { padding: 60px 12px; text-align: center; color: var(--muted); border: 1px dashed var(--border); border-radius: 9px; }
.side { position: sticky; top: 18px; display: grid; gap: 14px; }
.panel { border: 1px solid var(--border); border-radius: 10px; background: rgba(21,25,35,.96); padding: 17px; }
.panel h2 { margin: 0 0 13px; font-size: 16px; font-weight: 500; }
.selection { min-height: 72px; color: var(--muted); }
.selection strong { display: block; color: var(--text); margin-bottom: 6px; font-weight: 500; }
.parameter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
label { display: grid; gap: 5px; color: var(--muted); font-size: 12px; }
input[type="number"], select { width: 100%; min-height: 38px; border: 1px solid var(--border); border-radius: 7px; padding: 0 9px; background: #10141c; color: var(--text); }
.full { grid-column: 1 / -1; }
.primary { width: 100%; min-height: 43px; margin-top: 15px; border: 0; border-radius: 8px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; font-weight: 500; }
.primary:disabled { cursor: not-allowed; opacity: .45; }
.progress-panel[hidden] { display: none; }
.progress-head { display: flex; justify-content: space-between; gap: 10px; color: var(--muted); font-size: 12px; margin-bottom: 8px; }
progress { width: 100%; height: 9px; border: 0; border-radius: 999px; overflow: hidden; background: #292f3e; }
progress::-webkit-progress-bar { background: #292f3e; }
progress::-webkit-progress-value { background: linear-gradient(90deg, var(--accent), #4cc9f0); }
progress::-moz-progress-bar { background: linear-gradient(90deg, var(--accent), #4cc9f0); }
.error { color: #ff8995; margin-top: 9px; font-size: 13px; }
@media (max-width: 820px) {
  main { width: min(100% - 20px, 680px); padding-top: 24px; }
  .layout { grid-template-columns: 1fr; }
  .side { position: static; order: -1; }
  .hero { grid-template-columns: 1fr; align-items: start; gap: 12px; }
  .module-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 520px) {
  .module-grid { grid-template-columns: 1fr; }
  .module { min-height: 118px; }
}
</style>
<link rel="stylesheet" href="/battlescope/assets/battle-theme.css">
</head>
<body>
<main>
  <a class="site-return" href="/">← 返回战队官网</a>
  <header class="hero">
    <div class="brand-marks" aria-label="复旦大学与星云 EGA 战队">
      <img class="brand-mark brand-mark-fudan" src="/battlescope/assets/fudan-emblem-transparent.png" alt="复旦大学校徽" width="1254" height="1254">
      <img class="brand-mark brand-mark-ega" src="/battlescope/assets/ega-team-mark-transparent.png" alt="复旦大学星云 EGA RoboMaster 战队队徽" width="1254" height="1254">
    </div>
    <div class="hero-copy">
      <div class="eyebrow">复旦大学星云EGA战队</div>
      <h1>RM BattleScope</h1>
      <p>RoboMaster专项赛训复盘平台</p>
    </div>
    <div id="count" class="count" aria-live="polite">正在读取比赛…</div>
  </header>

  <nav class="module-grid" aria-label="分析模块">
    <a class="module" href="/battlescope/analysis/fudan/" style="--module-color:#e94b5f">
      <span class="index">全队视角</span><strong>赛局总览</strong>
      <small>经济、伤害转化与步哨兵火力覆盖</small>
    </a>
    <a class="module" href="/battlescope/analysis/tactical/" style="--module-color:#3f8fdf">
      <span class="index">攻防视角</span><strong>交战态势</strong>
      <small>交火热区、建筑血量、压制与人头效率</small>
    </a>
    <a class="module" href="/battlescope/analysis/strong/" style="--module-color:#e94b5f">
      <span class="index">对标视角</span><strong>强队对标</strong>
      <small>站位策略、阶段收益与官方录像同步</small>
    </a>
    <a class="module" href="/battlescope/analysis/operators/" style="--module-color:#3f8fdf">
      <span class="index">个人视角</span><strong>操作表现</strong>
      <small>按操作位复盘生存、火力、移动与协同</small>
    </a>
  </nav>

  <div class="section-head">
    <div><h2>单局回放</h2><p>搜索并选择比赛，生成带轨迹、事件和状态的交互回放。</p></div>
  </div>
  <div class="search">
    <input id="search" type="search" placeholder="搜索学校、赛区、赛程或比赛 ID" autocomplete="off" aria-label="搜索比赛">
  </div>

  <div class="layout">
    <section id="matches" class="matches" aria-label="比赛列表"><div class="loading">正在读取比赛列表…</div></section>

    <aside class="side">
      <section class="panel">
        <h2>回放生成</h2>
        <div id="selection" class="selection">先从左侧选择一局比赛</div>
        <form id="parameters">
          <div class="parameter-grid">
            <label>开始时间 / 秒<input id="start" name="start" type="number" min="0" step="1" placeholder="0"></label>
            <label>结束时间 / 秒<input id="end" name="end" type="number" min="0" step="1" placeholder="420"></label>
            <label>最大插值缺帧<select id="maxGap" name="max_gap"><option>0</option><option>1</option><option selected>3</option><option>5</option><option>10</option></select></label>
            <label>平滑窗口<select id="smoothWindow" name="smooth_window"><option>1</option><option selected>3</option><option>5</option><option>7</option><option>9</option></select></label>
            <label class="full">轨迹跳变阈值 / m·s⁻¹<input id="maxSpeed" name="max_speed" type="number" min="0.1" max="30" step="0.1" value="8"></label>
          </div>
          <button id="generate" class="primary" type="submit" disabled>打开示例回放</button>
        </form>
        <p class="muted" style="margin:12px 0 0;font-size:11px;line-height:1.55">静态在线版可浏览完整分析数据；任意对局解析需在本地运行，此处打开预生成交互回放示例。</p>
      </section>

      <section id="progressPanel" class="panel progress-panel" hidden aria-live="polite">
        <div class="progress-head"><span id="stage">等待解析</span><span id="percent">0%</span></div>
        <progress id="progress" max="100" value="0">0%</progress>
        <div id="jobError" class="error"></div>
      </section>
    </aside>
  </div>
</main>
<script>
const staticBase='/battlescope';
const searchInput=document.getElementById('search');
const matchesElement=document.getElementById('matches');
const countElement=document.getElementById('count');
const selectionElement=document.getElementById('selection');
const form=document.getElementById('parameters');
const generateButton=document.getElementById('generate');
const progressPanel=document.getElementById('progressPanel');
const progressElement=document.getElementById('progress');
const stageElement=document.getElementById('stage');
const percentElement=document.getElementById('percent');
const jobError=document.getElementById('jobError');
let selectedMatch=null;
let searchTimer=null;
let searchController=null;

function escapeHtml(value) {
  return String(value??'').replace(/[&<>'"]/g,character=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[character]));
}

function matchMarkup(match) {
  const selected=selectedMatch?.game_id===match.game_id;
  return `<button class="match" type="button" data-game-id="${match.game_id}" aria-pressed="${selected}">
    <span class="match-top"><span>${escapeHtml(match.赛区)} · 第${match.场次号}场第${match.局号}局</span><span>${escapeHtml(match.开始时间)}</span></span>
    <span class="teams"><span class="team"><span class="dot red"></span><span>${escapeHtml(match.红方学校)}</span></span><span class="versus">VS</span><span class="team"><span class="dot blue"></span><span>${escapeHtml(match.蓝方学校)}</span></span></span>
  </button>`;
}

async function loadMatches(keyword='') {
  if(searchController) searchController.abort();
  searchController=new AbortController();
  matchesElement.innerHTML='<div class="loading">正在读取比赛列表…</div>';
  try {
    const response=await fetch(`${staticBase}/api/matches.json`,{signal:searchController.signal});
    if(!response.ok) throw new Error('比赛列表读取失败');
    const payload=await response.json();
    if(keyword){const term=keyword.toLocaleLowerCase();payload.matches=payload.matches.filter(match=>Object.values(match).some(value=>String(value??" ").toLocaleLowerCase().includes(term)));}
    countElement.textContent=keyword?`找到 ${payload.matches.length} 局`:`共 ${payload.matches.length} 局`;
    matchesElement.innerHTML=payload.matches.length?payload.matches.map(matchMarkup).join(''):'<div class="empty">没有匹配的比赛</div>';
    matchesElement.querySelectorAll('.match').forEach((button,index)=>button.addEventListener('click',()=>selectMatch(payload.matches[index])));
  } catch(error) {
    if(error.name!=='AbortError') matchesElement.innerHTML=`<div class="empty">${escapeHtml(error.message)}</div>`;
  }
}

function selectMatch(match) {
  selectedMatch=match;
  matchesElement.querySelectorAll('.match').forEach(button=>button.setAttribute('aria-pressed',String(Number(button.dataset.gameId)===match.game_id)));
  selectionElement.innerHTML=`<strong><span style="color:var(--red)">${escapeHtml(match.红方学校)}</span> vs <span style="color:var(--blue)">${escapeHtml(match.蓝方学校)}</span></strong><span>${escapeHtml(match.赛区)} · 第${match.场次号}场第${match.局号}局 · ${match.game_id}</span>`;
  document.getElementById('start').placeholder='0';
  document.getElementById('end').placeholder=String(match.时长秒||420);
  generateButton.disabled=false;
}

searchInput.addEventListener('input',()=>{
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>loadMatches(searchInput.value.trim()),180);
});

form.addEventListener('submit',async event=>{
  event.preventDefault();
  if(!selectedMatch) return;
  if(staticBase){location.href=`${staticBase}/replay/`;return;}
  generateButton.disabled=true;
  progressPanel.hidden=false;
  jobError.textContent='';
  progressElement.value=0;
  stageElement.textContent='正在创建解析任务';
  percentElement.textContent='0%';
  const payload={
    game_id:selectedMatch.game_id,
    start:document.getElementById('start').value,
    end:document.getElementById('end').value,
    max_gap:document.getElementById('maxGap').value,
    smooth_window:document.getElementById('smoothWindow').value,
    max_speed:document.getElementById('maxSpeed').value
  };
  try {
    const response=await fetch('/api/jobs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const job=await response.json();
    if(!response.ok) throw new Error(job.error||'任务创建失败');
    await pollJob(job.job_id);
  } catch(error) {
    jobError.textContent=error.message;
    stageElement.textContent='解析失败';
    generateButton.disabled=false;
  }
});

async function pollJob(jobId) {
  while(true) {
    const response=await fetch(`/api/jobs/${encodeURIComponent(jobId)}`,{cache:'no-store'});
    const job=await response.json();
    if(!response.ok) throw new Error(job.error||'无法读取任务进度');
    progressElement.value=job.progress;
    progressElement.textContent=`${job.progress}%`;
    stageElement.textContent=job.stage;
    percentElement.textContent=`${job.progress}%`;
    if(job.status==='done') {
      location.href=job.replay_url;
      return;
    }
    if(job.status==='error') throw new Error(job.error||'解析失败');
    await new Promise(resolve=>setTimeout(resolve,350));
  }
}

loadMatches();
</script>
</body>
</html>
