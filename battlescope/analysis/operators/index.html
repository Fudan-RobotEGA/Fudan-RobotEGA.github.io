<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>复旦 · 操作表现</title><style>
:root{color-scheme:dark;font-family:"Arial Narrow","Microsoft YaHei UI",system-ui,sans-serif;--bg:#090d14;--panel:#131a26;--border:#2d384b;--text:#f4f7fb;--muted:#97a4b8;--accent:#52d7b0;--average:#f6c963;--danger:#ff7182}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 40% -20%,#27344c 0,var(--bg) 43%);color:var(--text)}main{width:min(1300px,calc(100% - 28px));margin:auto;padding:28px 0 60px}a{color:#9fcaff;text-decoration:none}h1{font-size:clamp(26px,4vw,40px);margin:8px 0}p{color:var(--muted)}.controls{display:flex;flex-wrap:wrap;gap:12px;margin:18px 0}.controls label{display:grid;gap:5px;color:var(--muted);font-size:11px}select{font:inherit;min-width:240px;padding:10px;background:#101722;border:1px solid var(--border);border-radius:8px;color:var(--text)}.average-heading{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin:18px 0 0}.average-heading h2{font-size:15px;margin:0}.average-heading span{color:var(--muted);font-size:11px}.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin:10px 0 15px}.card,.panel{background:rgba(19,26,38,.95);border:1px solid var(--border);border-radius:10px}.card{padding:12px}.card span{display:block;color:var(--muted);font-size:10px}.card b{display:block;font-size:21px;margin-top:5px}.panel{padding:14px;overflow:auto}.radar-panel{margin:0 0 15px;overflow:hidden}.panel-head{display:flex;justify-content:space-between;gap:12px;align-items:baseline}.panel-head h2{font-size:15px;margin:0}.status{font-size:11px;color:var(--muted)}.status.error{color:var(--danger)}svg.radar{display:block;width:100%;height:360px}.radar-grid{fill:none;stroke:#2b374b;stroke-width:1}.radar-axis{stroke:#3a485e;stroke-width:1}.radar-shape{fill:#52d7b03d;stroke:var(--accent);stroke-width:2}.radar-dot{fill:var(--accent)}.radar-average{fill:#f6c96312;stroke:var(--average);stroke-width:2;stroke-dasharray:7 5}.radar-average-dot{fill:var(--average)}.radar-label{fill:var(--text);font-size:12px}.radar-value{fill:var(--muted);font-size:10px}.radar-legend{display:flex;justify-content:center;gap:20px;color:var(--muted);font-size:11px}.radar-legend span{display:inline-flex;align-items:center;gap:7px}.legend-line{width:24px;border-top:2px solid var(--accent)}.legend-line.average{border-top-color:var(--average);border-top-style:dashed}table{width:100%;border-collapse:collapse;font-size:11px;white-space:nowrap}th,td{text-align:right;padding:8px;border-bottom:1px solid #293346}th:first-child,td:first-child{text-align:left}tbody tr{cursor:pointer}tbody tr:hover,tbody tr:focus-visible{background:#182130;outline:none}tbody tr.selected{background:#17332f;box-shadow:inset 3px 0 var(--accent)}.win{color:var(--accent)}.loss{color:var(--danger)}.method{font-size:11px;line-height:1.7;margin-top:13px}@media(max-width:850px){.cards{grid-template-columns:repeat(2,1fr)}svg.radar{height:320px}}@media(max-width:540px){.controls{display:grid}select{width:100%;min-width:0}.cards{grid-template-columns:1fr 1fr}.panel-head,.average-heading{align-items:flex-start;flex-direction:column}}
</style><link rel="stylesheet" href="/battlescope/assets/battle-theme.css"></head><body><main>
<nav class="analysis-switcher" aria-label="分析页面快捷切换"><a class="switcher-home" href="/battlescope/">首页</a><a href="/battlescope/analysis/fudan/">赛局总览</a><a href="/battlescope/analysis/tactical/">交战态势</a><a href="/battlescope/analysis/strong/">强队对标</a><a href="/battlescope/analysis/operators/" aria-current="page">操作表现</a><a href="/battlescope/analysis/opponents/">对手分析</a></nav>
<h1>操作表现</h1><p>全部指标来自复旦 17 场遥测与事件，按机器人操作位汇总。逐局明细随页面一次加载，选局仅切换雷达对照。</p>
<section class="controls"><label>选择操作位<select id="role"></select></label><label>选择局次<select id="game"><option value="">请选择一局</option></select></label></section>
<section class="panel radar-panel"><div class="panel-head"><h2 id="radarTitle">复旦 17 场平均六维表现</h2><span id="radarStatus" class="status">选择一局可叠加单局表现</span></div><svg id="radar" class="radar" viewBox="0 0 520 360" role="img" aria-label="单局与复旦平均六维表现图"></svg><div class="radar-legend"><span><i class="legend-line"></i>当前单局</span><span><i class="legend-line average"></i>复旦 17 场平均</span></div></section>
<div class="average-heading"><h2>复旦 17 场平均 · 当前操作位</h2><span id="averageRole"></span></div>
<section id="cards" class="cards"></section>
<section class="panel"><table><thead><tr><th>对局</th><th>结果</th><th>存活秒</th><th>阵亡</th><th>最高装配</th><th>局总经济增益</th><th>发弹</th><th>每存活分钟发弹</th><th>承伤</th><th>路程/m</th><th>高热量秒</th><th>支援距离/m</th><th>孤立秒</th><th>增益次数</th><th>最长火力空窗</th></tr></thead><tbody id="rows"></tbody></table></section>
<p id="method" class="method"></p>
</main><script>
const NS='http://www.w3.org/2000/svg',role=document.getElementById('role'),game=document.getElementById('game'),cards=document.getElementById('cards'),rows=document.getElementById('rows'),method=document.getElementById('method'),radar=document.getElementById('radar'),radarTitle=document.getElementById('radarTitle'),radarStatus=document.getElementById('radarStatus'),averageRole=document.getElementById('averageRole');let data,currentReport,currentKey='',axes=[];
const fmt=(v,d=0)=>v==null?'-':Number(v).toLocaleString('zh-CN',{maximumFractionDigits:d}),esc=v=>String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),keyOf=v=>`${v.game_id}:${v.robot_id}`;
function node(name,attrs={}){const element=document.createElementNS(NS,name);Object.entries(attrs).forEach(([key,value])=>element.setAttribute(key,value));return element}
function point(index,radius){const angle=-Math.PI/2+index*Math.PI/3;return [260+Math.cos(angle)*radius,174+Math.sin(angle)*radius]}
function radarScore(value,range){if(value==null||range==null||range.min==null||range.max==null||range.max===range.min)return 50;let score=(Number(value)-range.min)/(range.max-range.min);if(range.inverse)score=1-score;return Math.max(0,Math.min(100,score*100))}
function axisUnit(key){return key==='assembly_max_level'?'级':key==='mean_support_distance'?'m':key==='isolated_seconds'?'s':key==='economy_gain_7m'?'金币':key==='shots'?'发':key==='buff_count'?'次':key==='deaths'?'次':''}function averageDetail(){return currentReport.radar_averages}
function appendShape(values,shapeClass,dotClass){const scores=axes.map(axis=>radarScore(values[axis[0]],currentReport.radar_ranges[axis[0]])),points=scores.map((score,index)=>point(index,120*score/100));radar.append(node('polygon',{points:points.map(value=>value.join(',')).join(' '),class:shapeClass}));points.forEach(value=>radar.append(node('circle',{cx:value[0],cy:value[1],r:3,class:dotClass})))}
function drawRadar(detail=null){const average=averageDetail();radar.innerHTML='';for(let ring=1;ring<=4;ring++)radar.append(node('polygon',{points:axes.map((_,i)=>point(i,120*ring/4).join(',')).join(' '),class:'radar-grid'}));axes.forEach((axis,i)=>{const end=point(i,120);radar.append(node('line',{x1:260,y1:174,x2:end[0],y2:end[1],class:'radar-axis'}));const labelPoint=point(i,151),anchor=i===0||i===3?'middle':i<3?'start':'end',label=node('text',{x:labelPoint[0],y:labelPoint[1]-2,'text-anchor':anchor,class:'radar-label'});label.textContent=axis[1];radar.append(label);const digits=axis[0]==='mean_support_distance'?1:0,value=node('text',{x:labelPoint[0],y:labelPoint[1]+13,'text-anchor':anchor,class:'radar-value'}),averageText=`均 ${fmt(average[axis[0]],digits)}${average[axis[0]]==null?'':axis[2]}`;value.textContent=detail?`${fmt(detail[axis[0]],digits)}${detail[axis[0]]==null?'':axis[2]} / ${averageText}`:averageText;radar.append(value)});appendShape(average,'radar-average','radar-average-dot');if(detail)appendShape(detail,'radar-shape','radar-dot')}
function matchLabel(v){return `第${v.场次号}场第${v.局号}局 · ${v.opponent}`}
function detailCells(v){const detail=v.detail,isEngineer=currentReport.robot_type==='工程';return `<td>${esc(matchLabel(v))}</td><td class="${v.won?'win':'loss'}">${v.won?'胜':'负'}</td><td>${detail.alive_seconds}</td><td>${detail.deaths}</td><td>${isEngineer?detail.assembly_max_level+'级':'-'}</td><td>${isEngineer?fmt(detail.economy_gain_7m):'-'}</td><td>${detail.shots}</td><td>${fmt(detail.shots_per_alive_minute,1)}</td><td>${fmt(detail.damage_taken)}</td><td>${fmt(detail.path_m,1)}</td><td>${detail.high_heat_seconds}</td><td>${fmt(detail.mean_support_distance,1)}</td><td>${detail.isolated_seconds}</td><td>${detail.buff_count}</td><td>${detail.longest_fire_gap==null?'不适用':detail.longest_fire_gap+'s'}</td>`}
function selectMatch(key){currentKey=key;game.value=key;rows.querySelectorAll('tr').forEach(row=>row.classList.toggle('selected',row.dataset.key===key));const match=currentReport.matches.find(value=>keyOf(value)===key);if(!match){radarTitle.textContent='复旦 17 场平均六维表现';radarStatus.textContent='选择一局可叠加单局表现';drawRadar();return}drawRadar(match.detail);radarTitle.textContent=`${matchLabel(match)} · 六维表现`;radarStatus.textContent='实线为当前单局，虚线为复旦 17 场平均';radarStatus.className='status'}
function renderRole(){currentKey='';currentReport=data.reports[+role.value];axes=currentReport.radar_metrics.map(v=>[v.key,v.label,axisUnit(v.key)]);const s=currentReport.summary,isEngineer=currentReport.robot_type==='工程',special=isEngineer?[['平均最高装配',fmt(s.average_assembly_max_level,1)+'级'],['平均局总经济增益',s.average_economy_gain_7m==null?'暂无数据':fmt(s.average_economy_gain_7m)+'金币']]:[['平均发弹',fmt(s.average_shots,1)],['平均增益次数',fmt(s.average_buff_count,1)]];averageRole.textContent=currentReport.identity;cards.innerHTML=[['平均阵亡',fmt(s.average_deaths,1)],['平均承伤',fmt(s.average_damage_taken,1)],['平均支援距离',fmt(s.average_support_distance,1)+'m'],['平均孤立时间',fmt(s.average_isolated_seconds,1)+'s'],...special,['平均路程',fmt(s.average_path_m,1)+'m'],['平均高热量',fmt(s.average_high_heat_seconds,1)+'s']].map(value=>`<div class="card"><span>${value[0]}</span><b>${value[1]}</b></div>`).join('');game.innerHTML='<option value="">请选择一局</option>'+currentReport.matches.map(v=>`<option value="${keyOf(v)}">${esc(matchLabel(v))}</option>`).join('');rows.innerHTML=currentReport.matches.map(v=>`<tr tabindex="0" data-key="${keyOf(v)}">${detailCells(v)}</tr>`).join('');radarTitle.textContent='复旦 17 场平均六维表现';radarStatus.textContent='选择一局可叠加单局表现';radarStatus.className='status';drawRadar()}
rows.addEventListener('click',event=>{const row=event.target.closest('tr');if(row)selectMatch(row.dataset.key)});rows.addEventListener('keydown',event=>{const row=event.target.closest('tr');if(row&&(event.key==='Enter'||event.key===' ')){event.preventDefault();selectMatch(row.dataset.key)}});game.onchange=()=>selectMatch(game.value);role.onchange=renderRole;
fetch('/battlescope/api/operators.json').then(response=>{if(!response.ok)throw Error('报告读取失败');return response.json()}).then(payload=>{data=payload;role.innerHTML=payload.reports.map((value,index)=>`<option value="${index}">${esc(value.identity)}</option>`).join('');method.textContent='统计口径：'+Object.values(payload.methodology).join('；')+'。';renderRole()}).catch(error=>{method.textContent=error.message;radarStatus.textContent=error.message;radarStatus.className='status error'});
</script></body></html>
