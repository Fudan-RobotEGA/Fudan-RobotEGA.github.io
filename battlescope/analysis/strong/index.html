<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>复旦 · 强队对标</title>
<style>
:root{color-scheme:dark;font-family:"Arial Narrow","Microsoft YaHei UI",system-ui,sans-serif;--bg:#080b11;--panel:#121824;--border:#2b3548;--text:#f4f7fb;--muted:#96a2b7;--self:#48d7b0;--enemy:#ff6278;--gold:#f7ca62;--blue:#62a7ff}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 45% -20%,#26334b 0,var(--bg) 43%);color:var(--text)}main{width:min(1450px,calc(100% - 28px));margin:auto;padding:28px 0 60px}a{color:#9bc8ff;text-decoration:none}h1{font-size:clamp(26px,4vw,40px);margin:7px 0;font-weight:550}.muted,.note{color:var(--muted)}.note{font-size:12px;line-height:1.65}.controls{display:flex;gap:10px;flex-wrap:wrap;margin:20px 0}.controls label{display:grid;gap:5px;color:var(--muted);font-size:11px}select,button{font:inherit;border:1px solid var(--border);background:#101620;color:var(--text);border-radius:8px;padding:9px 11px}select.match{min-width:300px}button{cursor:pointer}.summary-grid,.maps,.lower{display:grid;grid-template-columns:1fr 1fr;gap:12px}.match-panel,.card{border:1px solid var(--border);background:rgba(18,24,36,.95);border-radius:11px;padding:14px}.match-title,.item-head{display:flex;justify-content:space-between;gap:12px;align-items:baseline}.match-title h2,.card h2{font-size:15px;margin:0 0 9px}.result.win{color:var(--self)}.result.loss{color:var(--enemy)}.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.metric{background:#0d131d;border-radius:7px;padding:9px}.metric span{display:block;color:var(--muted);font-size:10px}.metric b{display:block;margin-top:4px;font-size:17px}.maps,.lower{margin-top:12px}.wide{grid-column:1/-1}.field{width:100%;aspect-ratio:28/15;background:#0d1720;border:1px solid #3b485b;border-radius:5px;display:block}.legend{font-size:11px;color:var(--muted);margin-top:7px}.chart{width:100%;height:220px;display:block}.grid{stroke:#263145}.tick{fill:#8491a7;font-size:10px}.line{fill:none;stroke-width:2}.list{display:grid;gap:8px;max-height:470px;overflow:auto}.item{background:#0d131d;border-left:3px solid #61708c;border-radius:6px;padding:9px}.item.high{border-left-color:var(--enemy)}.item.medium{border-left-color:var(--gold)}.item h3{font-size:13px;margin:0}.item p{font-size:11px;color:var(--muted);margin:5px 0}.snapshot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.snapshot{background:#0d131d;border-radius:7px;padding:8px}.snapshot canvas{width:100%;aspect-ratio:28/15;display:block}.snapshot b{font-size:12px}.snapshot p{font-size:10px;color:var(--muted);margin:4px 0}.table{width:100%;border-collapse:collapse;font-size:11px}.table th,.table td{text-align:right;padding:7px;border-bottom:1px solid #273143}.table th:first-child,.table td:first-child{text-align:left}.status{position:fixed;right:16px;bottom:16px;background:#111a27;border:1px solid #3a485d;border-radius:8px;padding:10px 13px;display:none;z-index:5}@media(max-width:900px){.summary-grid,.maps,.lower{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}.snapshot-grid{grid-template-columns:1fr 1fr}.wide{grid-column:auto}}
</style><link rel="stylesheet" href="/battlescope/assets/battle-theme.css"></head>
<body><main>
<nav class="analysis-switcher" aria-label="分析页面快捷切换"><a class="switcher-home" href="/battlescope/">首页</a><a href="/battlescope/analysis/fudan/">赛局总览</a><a href="/battlescope/analysis/tactical/">交战态势</a><a href="/battlescope/analysis/strong/" aria-current="page">强队对标</a><a href="/battlescope/analysis/operators/">操作表现</a></nav>
<h1>强队对标</h1><p class="muted">哈尔滨工业大学胜负局对照 + 东北大学压制样本。地图统一为复旦从左向右进攻。</p>
<div class="controls"><label>主分析对局<select id="primary" class="match"></select></label><label>对照对局<select id="comparison" class="match"></select></label><label>比赛阶段<select id="phase"></select></label><label>兵种<select id="robotType"><option value="全部">全部</option><option>英雄</option><option>工程</option><option>步兵3</option><option>步兵4</option><option>哨兵</option></select></label></div>
<section class="summary-grid"><article id="primarySummary" class="match-panel"></article><article id="comparisonSummary" class="match-panel"></article></section>
<section class="maps"><article class="card"><h2>主分析 · 站位热力图</h2><canvas id="primaryMap" class="field"></canvas><div class="legend">场地图已按 28m × 15m 有效区域标定 · 绿色：复旦　红色：对手</div></article><article class="card"><h2>对照 · 站位热力图</h2><canvas id="comparisonMap" class="field"></canvas><div class="legend">双方热区叠加于同一场地结构，可直接比较区域控制和前压深度</div></article></section>
<section class="lower"><article class="card wide"><h2>官方录像同步</h2><div id="videoSync" class="note"></div></article><article class="card wide"><h2>阵型支援与局部人数差</h2><svg id="formationChart" class="chart"></svg><p class="note">绿色为主分析支援距离，蓝色为对照支援距离；黄色虚线为主分析6m局部人数差。距离升高且人数差转负时，脱节风险增加。</p></article><article class="card"><h2>主分析 · 异常时刻</h2><div id="anomalies" class="list"></div></article><article class="card"><h2>经济投入后 60 秒收益</h2><div id="investments"></div></article><article class="card wide"><h2>关键交战快照</h2><div id="snapshots" class="snapshot-grid"></div></article></section>
<p id="methodology" class="note"></p><div id="status" class="status"></div>
</main><script>
const colors={self:'#48d7b0',opponent:'#ff6278',gold:'#f7ca62',blue:'#62a7ff'},primary=document.getElementById('primary'),comparison=document.getElementById('comparison'),phase=document.getElementById('phase'),robotType=document.getElementById('robotType'),primarySummary=document.getElementById('primarySummary'),comparisonSummary=document.getElementById('comparisonSummary'),primaryMap=document.getElementById('primaryMap'),comparisonMap=document.getElementById('comparisonMap'),formationChart=document.getElementById('formationChart'),anomalies=document.getElementById('anomalies'),investments=document.getElementById('investments'),snapshots=document.getElementById('snapshots'),methodology=document.getElementById('methodology'),videoSync=document.getElementById('videoSync'),statusBox=document.getElementById('status');let data;
const fieldImage=new Image();fieldImage.onload=()=>data&&render();fieldImage.src='/battlescope/assets/rmuc_2026_field_top_view.jpeg';
const fmt=(v,d=0)=>v==null?'-':Number(v).toLocaleString('zh-CN',{maximumFractionDigits:d}),gameLabel=g=>`第${g.场次号}场第${g.局号}局 · ${g.opponent} · ${g.won?'胜':'负'}`;
function summary(g){let s=g.summary;return `<div class="match-title"><h2>${gameLabel(g)}</h2><b class="result ${g.won?'win':'loss'}">${g.won?'胜':'负'}</b></div><div class="metrics"><div class="metric"><span>净伤害</span><b>${s.net_damage>0?'+':''}${fmt(s.net_damage)}</b></div><div class="metric"><span>支援距离中位数</span><b>${fmt(s.median_support_distance,1)}m</b></div><div class="metric"><span>局部人数差</span><b>${fmt(s.mean_local_balance,2)}</b></div><div class="metric"><span>火力空窗</span><b>${s.fire_gap_count}</b></div><div class="metric"><span>异常片段</span><b>${s.anomaly_count}</b></div></div>`}
function drawField(canvas,g){const dpr=devicePixelRatio||1,w=canvas.clientWidth,h=canvas.clientHeight;canvas.width=w*dpr;canvas.height=h*dpr;const c=canvas.getContext('2d');c.scale(dpr,dpr);c.fillStyle='#0c151e';c.fillRect(0,0,w,h);if(fieldImage.complete&&fieldImage.naturalWidth)c.drawImage(fieldImage,100,69,1476,787,0,0,w,h);c.fillStyle='rgba(3,8,14,.52)';c.fillRect(0,0,w,h);c.strokeStyle='rgba(190,210,230,.13)';c.lineWidth=1;for(let x=0;x<=28;x+=2){c.beginPath();c.moveTo(x/28*w,0);c.lineTo(x/28*w,h);c.stroke()}for(let y=0;y<=15;y+=3){c.beginPath();c.moveTo(0,y/15*h);c.lineTo(w,y/15*h);c.stroke()}const cells=g.heatmap.filter(v=>v.phase===phase.value&&(robotType.value==='全部'||v.robot_type===robotType.value)),max=Math.max(1,...cells.map(v=>v.seconds)),radius=Math.max(w/28,h/15)*1.35;c.globalCompositeOperation='screen';for(const side of ['opponent','self'])for(const v of cells.filter(v=>v.side===side)){const a=.12+.7*v.seconds/max,x=(v.x+.5)/28*w,y=h-(v.y+.5)/15*h,rgb=side==='self'?'72,215,176':'255,98,120',gradient=c.createRadialGradient(x,y,0,x,y,radius);gradient.addColorStop(0,`rgba(${rgb},${a})`);gradient.addColorStop(1,`rgba(${rgb},0)`);c.fillStyle=gradient;c.fillRect(x-radius,y-radius,radius*2,radius*2)}c.globalCompositeOperation='source-over';c.strokeStyle='rgba(230,238,248,.8)';c.lineWidth=1.2;c.strokeRect(.6,.6,w-1.2,h-1.2);c.fillStyle='rgba(5,10,16,.72)';c.fillRect(5,h-24,58,18);c.fillRect(w-63,5,58,18);c.fillStyle='#e6edf6';c.font='11px system-ui';c.fillText('复旦侧',10,h-11);c.textAlign='right';c.fillText('对手侧',w-10,18);c.textAlign='left'}
function formation(g,o){const svg=formationChart,NS='http://www.w3.org/2000/svg';svg.innerHTML='';const w=svg.clientWidth,h=svg.clientHeight,p={l:38,r:15,t:10,b:24},iw=w-p.l-p.r,ih=h-p.t-p.b,node=(n,a={})=>{let e=document.createElementNS(NS,n);Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));return e};for(let i=0;i<=4;i++){let y=p.t+i/4*ih;svg.append(node('line',{x1:p.l,y1:y,x2:w-p.r,y2:y,class:'grid'}))}for(let i=0;i<=6;i++){let t=Math.round(g.时长秒*i/6),tx=node('text',{x:p.l+t/g.时长秒*iw,y:h-6,'text-anchor':'middle',class:'tick'});tx.textContent=t+'s';svg.append(tx)}for(const [game,key,color,dash] of [[g,'support_distance',colors.self,''],[o,'support_distance',colors.blue,''],[g,'local_balance',colors.gold,'5,4']]){let vals=game.formation.map(v=>v[key]),finite=vals.filter(v=>v!=null),min=key==='local_balance'?Math.min(-2,...finite):0,max=key==='local_balance'?Math.max(2,...finite):Math.max(12,...finite),pts=[];vals.forEach((v,i)=>{if(v!=null)pts.push(`${p.l+i/game.时长秒*iw},${p.t+ih-(v-min)/(max-min)*ih}`)});svg.append(node('polyline',{points:pts.join(' '),class:'line',stroke:color,'stroke-dasharray':dash}))}}
function showAnomalies(g){anomalies.innerHTML=g.anomalies.length?g.anomalies.map((a,i)=>`<div class="item ${a.severity}"><div class="item-head"><h3>${a.time}-${a.end}s · ${a.title}</h3><span><button class="video" data-index="${i}">官方录像</button></span></div><p>${a.detail}</p></div>`).join(''):'<div class="note">本口径下未识别到异常片段。</div>';anomalies.querySelectorAll('.video').forEach(b=>b.onclick=()=>openVideo(g,g.anomalies[+b.dataset.index].time))}
function showInvestments(g){investments.innerHTML=g.investments.length?`<table class="table"><thead><tr><th>时间/装配</th><th>投入</th><th>伤害</th><th>发弹</th><th>每100金币伤害</th></tr></thead><tbody>${g.investments.map(v=>`<tr><td>${v.time}s${v.upgrade?' · '+v.upgrade:''}</td><td>${fmt(v.spent)}</td><td>${fmt(v.damage_60s)}</td><td>${fmt(v.shots_60s)}</td><td>${fmt(v.damage_per_100,1)}</td></tr>`).join('')}</tbody></table>`:'<div class="note">未识别到至少25金币的相邻秒投入。</div>'}
function showSnapshots(g){snapshots.innerHTML=g.engagements.map((v,i)=>`<div class="snapshot"><b>${v.time}-${v.end}s · 净伤害 ${v.net_damage>0?'+':''}${fmt(v.net_damage)}</b><canvas data-index="${i}"></canvas><p>复旦输出 ${fmt(v.self_damage)} / 承伤 ${fmt(v.opponent_damage)} / 发弹 ${v.shots}</p></div>`).join('');snapshots.querySelectorAll('canvas').forEach(cv=>{let v=g.engagements[+cv.dataset.index],dpr=devicePixelRatio||1,w=cv.clientWidth,h=cv.clientHeight;cv.width=w*dpr;cv.height=h*dpr;let c=cv.getContext('2d');c.scale(dpr,dpr);c.fillStyle='#101b25';c.fillRect(0,0,w,h);if(fieldImage.complete&&fieldImage.naturalWidth)c.drawImage(fieldImage,100,69,1476,787,0,0,w,h);c.fillStyle='rgba(3,8,14,.42)';c.fillRect(0,0,w,h);c.strokeStyle='#708198';c.strokeRect(.5,.5,w-1,h-1);for(const p of v.positions){c.beginPath();c.fillStyle=colors[p.side];c.arc(p.x/28*w,h-p.y/15*h,Math.max(3,Math.min(7,3+p.health/600)),0,Math.PI*2);c.fill();c.fillStyle='#e8edf5';c.font='8px system-ui';c.fillText(p.robot_type.replace('步兵','')+p.robot_id,p.x/28*w+5,h-p.y/15*h-4)}})}
function videoInfo(g){const match=data.video_sync.matches.find(v=>v.game_id===g.game_id);if(!match)return null;return {match,group:data.video_sync.groups.find(v=>v.bvid===match.bvid)}}
function renderVideo(g){const info=videoInfo(g);if(!info){videoSync.textContent='该对局尚未核验公开录像。';return}const saved=localStorage.getItem('rm-video-anchor-'+info.group.bvid)??'';videoSync.innerHTML=`<b>已核验来源：</b><a href="${info.group.url}" target="_blank" rel="noopener">${info.group.title}</a>（${info.group.publisher}）<br>数据库确认本局相对首局开始 ${info.match.relative_start_seconds}s；首局录像锚点不在数据集中，请打开录像找到第一局倒计时7:00的画面并填写播放器时间。<br><label>首局0秒对应录像秒数 <input id="videoAnchor" type="number" min="0" step="1" value="${saved}" style="width:90px"> </label><label>当前数据秒数 <input id="videoDataTime" type="number" min="0" max="${g.时长秒}" value="0" style="width:80px"></label> <button id="saveAnchor">保存校准</button> <button id="openSyncedVideo">打开同步录像</button>`;document.getElementById('saveAnchor').onclick=()=>{const value=document.getElementById('videoAnchor').value;if(value==='')return;localStorage.setItem('rm-video-anchor-'+info.group.bvid,String(Math.round(Number(value))));statusBox.style.display='block';statusBox.textContent='校准已保存在当前浏览器'};document.getElementById('openSyncedVideo').onclick=()=>openVideo(g,Number(document.getElementById('videoDataTime').value)||0)}
function openVideo(g,dataSecond){const info=videoInfo(g),anchor=info&&localStorage.getItem('rm-video-anchor-'+info.group.bvid);if(!info)return alert('该对局尚未核验公开录像');if(anchor==null||anchor===''){statusBox.style.display='block';statusBox.textContent='请先在“官方录像同步”中填写首局录像锚点';return}const second=Math.round(Number(anchor)+info.match.relative_start_seconds+dataSecond);window.open(info.group.url+'?t='+second,'_blank','noopener')}
function render(){let g=data.games[+primary.value],o=data.games[+comparison.value];primarySummary.innerHTML=summary(g);comparisonSummary.innerHTML=summary(o);drawField(primaryMap,g);drawField(comparisonMap,o);renderVideo(g);formation(g,o);showAnomalies(g);showInvestments(g);showSnapshots(g)}
fetch('/battlescope/api/strong.json').then(r=>{if(!r.ok)throw Error('专题数据读取失败');return r.json()}).then(p=>{data=p;let options=p.games.map((g,i)=>`<option value="${i}">${gameLabel(g)}</option>`).join('');primary.innerHTML=options;comparison.innerHTML=options;let win=p.games.findIndex(g=>g.opponent==='哈尔滨工业大学'&&g.won),loss=p.games.findIndex(g=>g.opponent==='哈尔滨工业大学'&&!g.won);primary.value=String(loss>=0?loss:0);comparison.value=String(win>=0?win:1);phase.innerHTML=p.phases.map(v=>`<option value="${v.key}">${v.label}</option>`).join('');methodology.textContent='判定口径：'+Object.values(p.methodology).join('；')+'。异常标签用于定位复盘片段，不等同于对操作手的最终评价。';render()}).catch(e=>{statusBox.style.display='block';statusBox.textContent=e.message});[primary,comparison,phase,robotType].forEach(e=>e.onchange=render);window.onresize=()=>data&&render();
</script></body></html>
