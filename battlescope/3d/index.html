<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>三维战场 | RM BattleScope</title>
<style>
:root{color-scheme:dark;font-family:"Microsoft YaHei UI",system-ui,sans-serif;--bg:#090d14;--panel:#121923;--line:#2e3a4d;--text:#eef4ff;--muted:#9ba9bc;--red:#ff4d5e;--blue:#3f8cff}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text)}button,input{font:inherit}.app{display:grid;grid-template-columns:310px minmax(0,1fr);min-height:100vh}.sidebar{height:100vh;overflow:auto;padding:18px;border-right:1px solid var(--line);background:#111720}.return{display:inline-block;margin-bottom:18px;color:var(--muted);text-decoration:none}.brand{font-size:19px;font-weight:700}.brand span{color:#74849a}.scope{margin:8px 0 16px;color:var(--muted);font-size:12px;line-height:1.6}.search{width:100%;padding:10px 11px;border:1px solid var(--line);border-radius:7px;background:#0a0f16;color:var(--text);outline:none}.catalog{display:grid;gap:7px;margin-top:12px}.game{padding:10px;border:1px solid var(--line);border-radius:7px;background:#161e29;color:var(--text);text-align:left;cursor:pointer}.game:hover,.game[aria-pressed=true]{border-color:#71829b;background:#1b2634}.game strong,.game small{display:block}.game small{margin-top:5px;color:var(--muted)}.stage{position:relative;height:100vh;min-height:650px;overflow:hidden;background:var(--bg)}.arena-viewport{position:absolute;inset:0;overflow:hidden;background:radial-gradient(circle at 50% 20%,#1c2a3d 0,#090d14 62%);touch-action:none;cursor:grab}.arena-viewport:active{cursor:grabbing}canvas{width:100%;height:100%;display:block}.hud{position:absolute;top:15px;right:15px;width:min(300px,calc(100% - 30px));padding:13px;border:1px solid #40506a;border-radius:9px;background:rgba(13,18,27,.9);backdrop-filter:blur(10px)}.hud h1{margin:0 0 5px;font-size:15px}.hud p{margin:0;color:var(--muted);font-size:11px}.hud a{color:#a9c9ff}.stats{display:grid;grid-template-columns:1fr auto;gap:6px 10px;margin:13px 0;font-size:12px}.stats span{color:var(--muted)}.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.actions button{padding:7px 4px;border:1px solid #46556d;border-radius:5px;background:#202a38;color:var(--text);cursor:pointer}.timeline{position:absolute;left:20px;right:20px;bottom:20px;display:grid;grid-template-columns:auto minmax(120px,1fr) auto auto;gap:10px;align-items:center;padding:11px;border:1px solid #40506a;border-radius:9px;background:rgba(13,18,27,.9)}.timeline input{width:100%}.timeline output:last-child{min-width:44px;color:#ffd66b;font-variant-numeric:tabular-nums}.empty{padding:20px 8px;color:var(--muted);line-height:1.7}@media(max-width:820px){.app{grid-template-columns:1fr}.sidebar{height:auto;max-height:42vh;max-height:42svh;border-right:0;border-bottom:1px solid var(--line)}.stage{height:auto;min-height:0;overflow:visible}.arena-viewport{position:relative;inset:auto;height:58vh;height:58svh;min-height:430px}.hud{position:static;width:auto;margin:10px;padding:12px}.timeline{left:10px;right:10px;bottom:10px;grid-template-columns:auto minmax(90px,1fr) auto}.timeline output:last-child{display:none}}
</style>
</head>
<body><div class="app">
<aside class="sidebar"><a class="return" href="../">← 返回 BattleScope</a><div class="brand">RM BattleScope <span>· 3D</span></div><p id="scope" class="scope">正在读取公开对局范围…</p><input id="search" class="search" type="search" placeholder="搜索学校、赛区、场次" aria-label="搜索三维回放"><div id="catalog" class="catalog"><div class="empty">正在载入对局目录…</div></div></aside>
<main id="stage" class="stage"><div id="arenaViewport" class="arena-viewport"><canvas id="field" aria-label="RMUC 2026 三维战场"></canvas><div class="timeline"><button id="play" type="button" disabled>播放</button><input id="slider" type="range" min="0" max="420" step="0.01" value="0" disabled aria-label="比赛时间，0到420秒"><output id="elapsed">0.0 s</output><output id="clock" aria-label="比赛剩余时间">07:00</output></div></div><section class="hud"><h1 id="title">选择一局比赛</h1><p>拖动旋转 · 滚轮缩放 · 双击复位 · 标准对局 07:00</p><div class="stats"><span>比赛时刻</span><b id="time">—</b><span>存活车辆</span><b id="alive">—</b><span>当前交火</span><b id="attacks">—</b><span>遥测覆盖</span><b id="coverage">—</b><span>镜头</span><b id="camera">战术透视</b></div><div class="actions"><button id="reset" type="button">战术</button><button id="top" type="button">俯视</button><button id="low" type="button">低角</button></div><p style="margin-top:10px">场地按 <a href="https://bbs.robomaster.com/article/814728?source=4" target="_blank" rel="noopener">RMUC 2026 官方场地模型</a>与规则手册校准。</p></section></main>
</div><script src="arena3d.js"></script><script src="viewer.js"></script></body></html>
